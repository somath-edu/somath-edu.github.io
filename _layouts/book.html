---
layout: default
---

<div class="book-detail-container">
  <div class="book-header">
    <div class="book-cover-wrapper">
      <img src="{{ page.cover }}" alt="{{ page.title }}" class="book-cover">
    </div>
    <div class="book-info">
      <h1 class="book-title">{{ page.title }}</h1>
      <p class="book-author">By {{ page.author }}</p>
      <div class="book-meta">
        <span class="book-price">{{ page.price }}</span>
        <span class="book-date">{{ page.date | date: "%B %d, %Y" }}</span>
      </div>
      <p class="book-description">{{ page.description }}</p>
      
      <div class="notebooklm-integration">
        <h3>AI Insights by NotebookLM</h3>
        <p>Unlock deeper understanding with AI-generated summaries and audio overviews.</p>
        <div class="integration-buttons">
          <a href="{{ page.notebook_url }}" target="_blank" class="btn btn-primary">Open Notebook</a>
          <button id="play-audio" class="btn btn-secondary">Listen to Audio Overview</button>
        </div>
      </div>
    </div>
  </div>

  <div class="book-content">
    {{ content }}
  </div>
</div>

<style>
.book-detail-container {
  max-width: 1000px;
  margin: 2rem auto;
  padding: 0 1rem;
}

.book-header {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 3rem;
  margin-bottom: 3rem;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  padding: 2rem;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.book-cover {
  width: 100%;
  border-radius: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}

.book-cover:hover {
  transform: scale(1.02);
}

.book-title {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #fff 0%, #aaa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.book-author {
  font-size: 1.2rem;
  color: #888;
  margin-bottom: 1.5rem;
}

.book-meta {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  font-weight: bold;
}

.book-price {
  color: #4facfe;
}

.book-description {
  font-size: 1.1rem;
  line-height: 1.6;
  color: #ddd;
  margin-bottom: 2rem;
}

.notebooklm-integration {
  background: rgba(79, 172, 254, 0.1);
  padding: 1.5rem;
  border-radius: 15px;
  border: 1px dashed #4facfe;
}

.integration-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 1rem;
}

.btn {
  padding: 0.8rem 1.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: pointer;
}

.btn-primary {
  background: #4facfe;
  color: white;
}

.btn-primary:hover {
  background: #00f2fe;
  box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.2);
}

.book-content {
  font-size: 1.15rem;
  line-height: 1.8;
}

@media (max-width: 768px) {
  .book-header {
    grid-template-columns: 1fr;
    gap: 2rem;
  }
}
</style>
