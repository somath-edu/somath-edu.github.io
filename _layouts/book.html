---
layout: default
---

<div class="book-detail-container">
  <div class="book-header">
    <div class="book-cover-wrapper">
      <img src="{{ page.cover }}" alt="{{ page.title }}" class="book-cover">
    </div>
    <div class="book-info">
      <h1 class="book-title">{{ page.title }}</h1>
      <p class="book-author">By {{ page.author }}</p>
      <div class="book-meta">
        <span class="book-price">{{ page.price }}</span>
        <span class="book-date">{{ page.date | date: "%B %d, %Y" }}</span>
      </div>
      <p class="book-description">{{ page.description }}</p>
      
    </div>
  </div>

  <div class="book-content">
    {{ content }}
  </div>
</div>

<style>
.book-detail-container {
  max-width: 1000px;
  margin: 2rem auto;
  padding: 0 1rem;
}

.book-header {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 3rem;
  margin-bottom: 3rem;
  background: #fff;
  padding: 3rem;
  border-radius: 20px;
  border: 1px solid #e6ddd8;
  box-shadow: 0 15px 35px rgba(74, 59, 50, 0.05);
}

.book-cover {
  width: 100%;
  border-radius: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}

.book-cover:hover {
  transform: scale(1.02);
}

.book-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 1rem;
  color: #4a3b32;
  line-height: 1.2;
}

.book-title::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background-color: #d88e88;
  margin-top: 1rem;
}

.book-author {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.2rem;
  color: #8c7b75;
  margin-bottom: 2rem;
}

.book-meta {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  font-weight: bold;
}

.book-price {
  color: #4facfe;
}

.book-description {
  font-size: 1.1rem;
  line-height: 1.6;
  color: #ddd;
  margin-bottom: 2rem;
}



.btn {
  padding: 0.8rem 1.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: pointer;
}

.btn-primary {
  background: #4facfe;
  color: white;
}

.btn-primary:hover {
  background: #00f2fe;
  box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.2);
}

.book-content {
  font-size: 1.15rem;
  line-height: 1.8;
}

@media (max-width: 768px) {
  .book-header {
    grid-template-columns: 1fr;
    gap: 2rem;
  }
}
</style>
