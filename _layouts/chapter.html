---

  </div>

  <div class="chapter-content">
    {{ content }}
  </div>
</div>

<style>
.chapter-container {

  margin: 4rem auto;
  padding: 0 1rem;
}

.chapter-title {

  font-size: 2.2rem;

}

.chapter-content {
  font-size: 1.15rem;
  line-height: 1.8;
  color: #333;
}

  margin-top: 3rem;

  color: #2c2c2c;
  border-bottom: 1px solid #eee;
  padding-bottom: 0.5rem;
}

.chapter-content h3 {
  font-size: 1.4rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  color: #4a3b32;
}
