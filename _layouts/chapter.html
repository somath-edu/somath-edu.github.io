---
layout: default
---

<div class="chapter-container">
  <div class="chapter-header">
    <h1 class="chapter-title">{{ page.title }}</h1>
  </div>

  <div class="chapter-content">
    {{ content }}
  </div>

  <div class="chapter-navigation">
    {% if page.prev_link %}
      <a href="{{ page.prev_link }}" class="nav-btn prev">
        <span class="nav-label">이전 페이지</span>
      </a>
    {% else %}
      <div class="nav-placeholder"></div>
    {% endif %}

    <a href="/entropy.html" class="nav-btn list">
      <span class="nav-label">목록</span>
    </a>

    {% if page.next_link %}
      <a href="{{ page.next_link }}" class="nav-btn next">
        <span class="nav-label">다음 페이지</span>
      </a>
    {% else %}
      <div class="nav-placeholder"></div>
    {% endif %}
  </div>
</div>

<style>
.chapter-container {
  max-width: 800px;
  margin: 4rem auto;
  padding: 0 1rem;
}

.chapter-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 2.2rem;
  font-weight: 700;
  margin-bottom: 3rem;
  color: #2c2c2c;
  line-height: 1.3;
}

.chapter-content {
  font-size: 1.15rem;
  line-height: 1.8;
  color: #333;
}

.chapter-content h2 {
  font-size: 1.8rem;
  margin-top: 3rem;
  margin-bottom: 1.5rem;
  color: #2c2c2c;
  border-bottom: 1px solid #eee;
  padding-bottom: 0.5rem;
}

.chapter-content h3 {
  font-size: 1.4rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  color: #4a3b32;
}

.chapter-navigation {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 5rem;
  padding-top: 2rem;
  border-top: 1px solid #eee;
  gap: 1rem;
}

.nav-btn {
  text-decoration: none;
  color: #666;
  padding: 0.8rem 1.5rem;
  border-radius: 8px;
  background: #f8f9fa;
  font-size: 0.95rem;
  font-weight: 500;
  transition: all 0.2s ease;
  border: 1px solid #eee;
  flex: 1;
  text-align: center;
  max-width: 150px;
}

.nav-btn:hover {
  background: #fff;
  color: #2c2c2c;
  border-color: #d88e88;
  box-shadow: 0 4px 12px rgba(216, 142, 136, 0.1);
}

.nav-btn.list {
  background: #fff;
  border-color: #eee;
}

.nav-btn.list:hover {
  border-color: #d88e88;
}

.nav-placeholder {
  flex: 1;
  max-width: 150px;
}

@media (max-width: 768px) {
  .chapter-title {
    font-size: 1.8rem;
    margin-bottom: 2rem;
  }
  
  .chapter-navigation {
    margin-top: 3rem;
  }
  
  .nav-btn {
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
  }
}
</style>
