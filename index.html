<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive S - Digital Library</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="assets/css/bookstore.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-title">Archive S : Digital Library</div>
            <div class="header-icons">
                <button class="icon-btn" onclick="toggleSearch(true)">
                    <i data-lucide="search" style="color: var(--text-sub); width: 20px;"></i>
                </button>
            </div>
        </header>
        
        <!-- 홍보 및 공지 섹션 (Home의 역할) -->
        <section class="promo-section" id="section-home">
            <div class="promo-banner">
                <span class="promo-tag">New Release</span>
                <h1 class="promo-title">미적분 I <br>서브교과서 출간</h1>
                <p class="promo-desc">가장 완벽한 개념 정리를 위한 단 하나의 서브 텍스트. 지금 바로 도서관에서 만나보세요.</p>
            </div>
        </section>

        <!-- 신작/추천 섹션 -->
        <section class="library-section">
            <div class="section-header">
                <h2 class="section-title">Latest Arrivals</h2>
                <a href="/library.html" class="section-more">View All Library</a>
            </div>
            <div class="book-grid">
                <a href="/calculus.html" class="book-card">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/calculus_cover.png" alt="미적분 I">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">미적분 I - 서브교과서</div>
                        <div class="book-info-meta">Mathematics · Textbook</div>
                    </div>
                </a>
                <a href="/entropy.html" class="book-card">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/entropy_cover.png" alt="엔트로피 학습법">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">엔트로피 학습법</div>
                        <div class="book-info-meta">Methodology · Best</div>
                    </div>
                </a>
            </div>
        </section>

        <!-- 카테고리 바로가기 CTA -->
        <div class="home-cta">
            <h3 style="font-family: var(--font-serif); margin-bottom: 20px;">모든 도서 탐색하기</h3>
            <a href="/library.html" class="cta-button">카테고리별 서재로 이동</a>
        </div>

    </div>

    <!-- 검색 오버레이 (Home에서도 검색 가능하게 유지) -->
    <div id="search-overlay" class="search-overlay">
        <div class="search-container">
            <div class="search-header">
                <input type="text" id="search-input" placeholder="도서명 또는 카테고리 검색..." onkeydown="if(event.key === 'Enter') handleSearch(this.value)">
                <button class="close-search" onclick="toggleSearch(false)">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="search-results-info" class="search-results-info"></div>
        </div>
    </div>

    <!-- 하단 내비게이션 바 -->
    <nav class="bottom-nav">
        <a href="/" class="nav-item active" id="nav-home">
            <i data-lucide="home"></i>
            <span>홈</span>
        </a>
        <a href="/library.html" class="nav-item" id="nav-categories">
            <i data-lucide="layout-grid"></i>
            <span>카테고리</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" id="nav-search" onclick="toggleSearch(true)">
            <i data-lucide="search"></i>
            <span>검색</span>
        </a>
        <a href="/about/" class="nav-item">
            <i data-lucide="heart"></i>
            <span>후원</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();

        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            const input = document.getElementById('search-input');
            if (show) {
                overlay.classList.add('active');
                setTimeout(() => input.focus(), 300);
                document.body.style.overflow = 'hidden';
            } else {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // 홈에서는 검색 시 검색 결과를 보여줄 곳이 없으므로, 라이브러리 페이지로 검색어를 가지고 이동하게 하거나 간단히 알림을 띄울 수 있습니다.
        // 여기서는 라이브러리 페이지로 이동하게 하는 것이 자연스럽습니다.
        function handleSearch(query) {
            if (query.trim()) {
                window.location.href = `/library.html?search=${encodeURIComponent(query)}`;
            }
        }
    </script>

</body>
</html>
