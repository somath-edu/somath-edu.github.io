<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive S - Digital Library</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="assets/css/bookstore.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-title">Archive S : Digital Library</div>
            <div class="header-icons">
                <button class="icon-btn" onclick="toggleSearch(true)">
                    <i data-lucide="search" style="color: var(--text-sub); width: 20px;"></i>
                </button>
            </div>
        </header>

        <!-- 3단계: 태그 필터 (Chips) -->
        <div class="filter-container">
            <div class="filter-chip active" id="filter-all" onclick="filterBooks('all', this)">#전체</div>
            <div class="filter-chip" onclick="filterBooks('math', this)">#수학</div>
            <div class="filter-chip" onclick="filterBooks('philosophy', this)">#철학</div>
            <div class="filter-chip" onclick="filterBooks('method', this)">#학습법</div>
            <div class="filter-chip" onclick="filterBooks('new', this)">#신작</div>
        </div>
        
        <!-- 2단계: 카테고리 서가 (Science & Math) -->
        <section class="library-section" id="section-math">
            <div class="section-header">
                <h2 class="section-title">Science & Math</h2>
                <a href="#" class="section-more">View All</a>
            </div>
            <div class="book-grid">
                <a href="/calculus.html" class="book-card" data-category="math new">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/calculus_cover.png" alt="미적분 I">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">미적분 I - 서브교과서</div>
                        <div class="book-info-meta">Mathematics · Textbook</div>
                    </div>
                </a>
                <a href="#" class="book-card" data-category="math new">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/calculus_workbook_cover.png" alt="미적분 I 문제집">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">미적분 I - 문제집</div>
                        <div class="book-info-meta">Mathematics · Workbook</div>
                    </div>
                </a>
            </div>
        </section>

        <!-- 2단계: 카테고리 서가 (Humanities & Method) -->
        <section class="library-section" id="section-humanities">
            <div class="section-header">
                <h2 class="section-title">Humanities & Method</h2>
                <a href="#" class="section-more">View All</a>
            </div>
            <div class="book-grid">
                <a href="/entropy.html" class="book-card" data-category="method">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/entropy_cover.png" alt="엔트로피 학습법">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">엔트로피 학습법</div>
                        <div class="book-info-meta">Methodology · Best</div>
                    </div>
                </a>
                <a href="https://somath-edu.github.io/jekyll-survivlism" class="book-card" data-category="philosophy">
                    <div class="book-cover-wrapper">
                        <img src="assets/images/survivlism-cover.png" alt="생동주의자">
                    </div>
                    <div class="book-info">
                        <div class="book-info-title">생동주의자</div>
                        <div class="book-info-meta">Philosophy · Essay</div>
                    </div>
                </a>
            </div>
        </section>

    </div>

    <!-- 검색 오버레이 -->
    <div id="search-overlay" class="search-overlay">
        <div class="search-container">
            <div class="search-header">
                <input type="text" id="search-input" placeholder="도서명 또는 카테고리 검색..." oninput="handleSearch(this.value)">
                <button class="close-search" onclick="toggleSearch(false)">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="search-results-info" class="search-results-info"></div>
        </div>
    </div>

    <!-- 하단 내비게이션 바 -->
    <nav class="bottom-nav">
        <a href="/" class="nav-item active" id="nav-home">
            <i data-lucide="home"></i>
            <span>홈</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" id="nav-library" onclick="resetAndHome()">
            <i data-lucide="book-open"></i>
            <span>서재</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" id="nav-search" onclick="toggleSearch(true)">
            <i data-lucide="search"></i>
            <span>검색</span>
        </a>
        <a href="/about/" class="nav-item">
            <i data-lucide="heart"></i>
            <span>후원</span>
        </a>
    </nav>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        let currentCategory = 'all';
        let searchQuery = '';

        // 검색 오버레이 토글
        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            const input = document.getElementById('search-input');
            if (show) {
                overlay.classList.add('active');
                input.focus();
                document.body.style.overflow = 'hidden'; // 스크롤 방지
            } else {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // 검색 입력 처리
        function handleSearch(query) {
            searchQuery = query.toLowerCase();
            applyFilters();
            
            const info = document.getElementById('search-results-info');
            if (searchQuery) {
                const visibleCount = document.querySelectorAll('.book-card[style="display: block;"]').length;
                info.innerText = `'${query}' 검색 결과: ${visibleCount}권`;
            } else {
                info.innerText = '';
            }
        }

        // 필터링 기능
        function filterBooks(category, el) {
            currentCategory = category;
            
            // 칩 스타일 업데이트
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            if (el) el.classList.add('active');
            else document.getElementById('filter-all').classList.add('active');

            applyFilters();
        }

        // 서재 리셋 (홈으로)
        function resetAndHome() {
            searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('search-results-info').innerText = '';
            filterBooks('all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // 네비게이션 활성화 상태 업데이트
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('nav-library').classList.add('active');
        }

        // 통합 필터 적용
        function applyFilters() {
            const cards = document.querySelectorAll('.book-card');
            cards.forEach(card => {
                const title = card.querySelector('.book-info-title').innerText.toLowerCase();
                const meta = card.querySelector('.book-info-meta').innerText.toLowerCase();
                const categories = card.getAttribute('data-category').split(' ');
                
                const matchesCategory = currentCategory === 'all' || categories.includes(currentCategory);
                const matchesSearch = !searchQuery || title.includes(searchQuery) || meta.includes(searchQuery) || categories.some(cat => cat.includes(searchQuery));

                if (matchesCategory && matchesSearch) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });

            // 빈 섹션 처리
            document.querySelectorAll('.library-section').forEach(section => {
                const currentlyVisible = Array.from(section.querySelectorAll('.book-card')).filter(c => c.style.display !== 'none').length;
                section.style.display = currentlyVisible > 0 ? 'block' : 'none';
            });
        }
    </script>

</body>
</html>
